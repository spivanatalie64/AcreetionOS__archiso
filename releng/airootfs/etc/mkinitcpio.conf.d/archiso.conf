# Explicitly empty MODULES to prevent mkinitcpio from auto-including
# kernel modules that no longer exist (e.g. r8125 was removed from mainline).
# The hooks will still pull in whatever they need.
MODULES=()

HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
